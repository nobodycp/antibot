  {% if page_obj.has_other_pages %}
  <div class="ds-pagination mt-4 flex flex-wrap items-center gap-x-2 gap-y-1">
    {% if page_obj.has_previous %}
      <a href="{% url partial_view_name %}?page={{ page_obj.previous_page_number }}"
         hx-get="{% url partial_view_name %}?page={{ page_obj.previous_page_number }}"
         hx-target="#{{ wrapper_id }}" hx-swap="outerHTML"
         class="ds-pagination__link">← Prev</a>
    {% endif %}
    <span class="ds-pagination__meta tabular-nums">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a href="{% url partial_view_name %}?page={{ page_obj.next_page_number }}"
         hx-get="{% url partial_view_name %}?page={{ page_obj.next_page_number }}"
         hx-target="#{{ wrapper_id }}" hx-swap="outerHTML"
         class="ds-pagination__link">Next →</a>
    {% endif %}
  </div>
  {% endif %}
