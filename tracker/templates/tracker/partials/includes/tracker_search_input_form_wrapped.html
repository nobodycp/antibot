  <form method="get" class="w-full md:max-w-xs ml-auto">
    <input type="text" name="q" placeholder="{{ search_placeholder }}"
       hx-get="{{ search_url }}"
       hx-trigger="keyup changed delay:300ms"
       hx-target="#{{ search_target_id }}"
       hx-swap="outerHTML"
       hx-vals='{"page":1}'
       class="{% firstof search_input_class "ds-input ds-input--compact w-full" %}" />
  </form>
