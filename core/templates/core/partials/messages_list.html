{% if messages %}
<div class="messages-stack mb-3 space-y-1.5" role="status" aria-live="polite">
  {% for message in messages %}
    <div
      class="message ds-alert
        {% if message.level_tag == 'success' %}ds-alert--success
        {% elif message.level_tag == 'error' %}ds-alert--error
        {% elif message.level_tag == 'warning' %}ds-alert--warning
        {% elif message.level_tag == 'info' %}ds-alert--info
        {% else %}ds-alert--default{% endif %}"
      role="alert"
      data-message-level="{{ message.level_tag }}"
    >
      {{ message }}
    </div>
  {% endfor %}
</div>
{% endif %}
