{% load static %}
<!DOCTYPE html>
<html lang="en" class="dash-app-root h-full">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'dashboard/css/design-system.css' %}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'dashboard/css/design-system.css' %}" />
  </head>
  <body class="flex h-full items-center justify-center text-white antialiased">
    <div class="w-full max-w-sm space-y-6 px-6 py-8">
      <h1 class="text-center text-2xl font-bold tracking-tight text-white">
        Log in to <span class="text-zinc-400">Antibot</span>
      </h1>

      <div class="ds-card">
        <div class="ds-card__body space-y-4">
          {% if form.errors %}
            <p class="ds-alert ds-alert--error text-center" role="alert">
              Invalid username or password. Please try again.
            </p>
          {% endif %}

          <form method="post" class="ds-form-stack">
            {% csrf_token %}
            <div class="ds-field">
              <label class="sr-only" for="login-username">Username</label>
              <input id="login-username" type="text" name="username" placeholder="Email or Username" required class="ds-input w-full min-w-0" autocomplete="username">
            </div>
            <div class="ds-field">
              <label class="sr-only" for="login-password">Password</label>
              <input id="login-password" type="password" name="password" placeholder="Password" required class="ds-input w-full min-w-0" autocomplete="current-password">
            </div>
            <button type="submit" class="ds-btn ds-btn--inverse w-full">Log in</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
