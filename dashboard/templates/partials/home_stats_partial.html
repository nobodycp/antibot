  <div class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Total Visitors</div>
    <div class="text-sm font-bold text-white mt-1">{{ total_visitors }}</div>
  </div>

  <div class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">

  </div>

  <div class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Blocked IPs</div>

  <div class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Live Last Minute</div>
