<div
  hx-get="/dashboard/home/stats/"
  hx-trigger="every 10s"
  hx-target="this"
  hx-swap="outerHTML"
  class="grid grid-cols-2 sm:grid-cols-4 xl:grid-cols-4 gap-3"
>
  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Total Visitors</div>
    <div class="text-sm font-bold text-white mt-1">{{ total_visitors }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Denied Logs</div>
    <div class="text-sm font-bold text-red-400 mt-1">{{ total_denied }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Blocked IPs</div>
    <div class="text-sm font-bold text-yellow-400 mt-1">{{ total_blocked_ips }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Live Last Minute</div>
    <div class="text-sm font-bold text-green-400 mt-1">{{ live_last_minute }}</div>
  </div>
</div>
