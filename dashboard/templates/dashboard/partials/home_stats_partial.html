<div
  hx-get="/dashboard/home/stats/"
  hx-trigger="every 10s"
  hx-target="this"
  hx-swap="outerHTML"
  class="grid grid-cols-2 gap-3 sm:grid-cols-4 xl:grid-cols-4"
>
  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Total Visitors</div>
    <div class="ds-stat-tile__value">{{ total_visitors }}</div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Denied Logs</div>
    <div class="ds-stat-tile__value"><span class="ds-text-danger">{{ total_denied }}</span></div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Blocked IPs</div>
    <div class="ds-stat-tile__value"><span class="ds-text-warning">{{ total_blocked_ips }}</span></div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Live Last Minute</div>
    <div class="ds-stat-tile__value"><span class="ds-text-success">{{ live_last_minute }}</span></div>
  </div>
</div>
