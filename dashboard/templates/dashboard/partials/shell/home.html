<span class="hidden" data-page-title="Dashboard"></span>
<div class="ds-page-shell">
  <header class="dash-page-header">
    <div class="flex flex-col gap-1">
      <h1 class="ds-page-header__title ds-page-header__title--large">Dashboard</h1>
      <p class="ds-page-header__subtitle max-w-3xl sm:text-[13px]">Overview of visitors, denied logs, top activity, and alerts.</p>
    </div>
  </header>

  <!-- 1) Stats -->
  <div
    hx-get="/dashboard/home/stats/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="ds-card dash-surface animate-pulse px-4 py-3 ds-loading-placeholder">
      Loading stats…
    </div>
  </div>

  <!-- 2) Secondary Stats -->
  <div
    hx-get="/dashboard/home/secondary-stats/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="ds-card dash-surface animate-pulse px-4 py-3 text-xs ds-home-widget__empty">
      Loading secondary stats…
    </div>
  </div>

  <!-- 3) Latest Logs -->
  <div
    hx-get="/dashboard/home/latest-logs/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="ds-card dash-surface animate-pulse px-4 py-3 ds-loading-placeholder">
      Loading latest logs…
    </div>
  </div>

  {% include "dashboard/partials/home_rsa_decrypt_widget.html" %}

  <!-- 4) Alerts -->
  <div
    hx-get="/dashboard/home/alerts/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="ds-card dash-surface animate-pulse px-4 py-3 ds-loading-placeholder">
      Loading alerts…
    </div>
  </div>

  <!-- 5) Top IPs -->
  <div
    hx-get="/dashboard/home/top-ips/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="ds-card dash-surface animate-pulse px-4 py-3 ds-loading-placeholder">
      Loading top IPs…
    </div>
  </div>
</div>
