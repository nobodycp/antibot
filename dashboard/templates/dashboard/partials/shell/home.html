<span class="hidden" data-page-title="Dashboard"></span>
<div class="min-w-0 w-full space-y-5 text-sm">
  <header class="mb-2 border-b border-zinc-700/50 pb-4">
    <div class="flex flex-col gap-1">
      <h1 class="text-base font-semibold tracking-tight text-white sm:text-lg">Dashboard</h1>
      <p class="max-w-3xl text-xs leading-relaxed text-zinc-500 sm:text-[13px]">Overview of visitors, denied logs, top activity, and alerts.</p>
    </div>
  </header>

  <!-- 1) Stats -->
  <div
    hx-get="/dashboard/home/stats/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-4 py-3 text-xs text-zinc-500 shadow-lg shadow-black/15 ring-1 ring-zinc-700/30">
      Loading stats…
    </div>
  </div>

  <!-- 2) Secondary Stats -->
  <div
    hx-get="/dashboard/home/secondary-stats/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-4 py-3 text-xs text-zinc-500 shadow-lg shadow-black/15 ring-1 ring-zinc-700/30">
      Loading secondary stats…
    </div>
  </div>

  <!-- 3) Latest Logs -->
  <div
    hx-get="/dashboard/home/latest-logs/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-4 py-3 text-xs text-zinc-500 shadow-lg shadow-black/15 ring-1 ring-zinc-700/30">
      Loading latest logs…
    </div>
  </div>

  <!-- 4) Alerts -->
  <div
    hx-get="/dashboard/home/alerts/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-4 py-3 text-xs text-zinc-500 shadow-lg shadow-black/15 ring-1 ring-zinc-700/30">
      Loading alerts…
    </div>
  </div>

  <!-- 5) Top IPs -->
  <div
    hx-get="/dashboard/home/top-ips/"
    hx-trigger="load"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-4 py-3 text-xs text-zinc-500 shadow-lg shadow-black/15 ring-1 ring-zinc-700/30">
      Loading top IPs…
    </div>
  </div>
</div>
