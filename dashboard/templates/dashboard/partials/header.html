<header class="dash-app-header dash-header-bar z-10 shrink-0">
  <div class="mx-auto flex h-11 max-w-[1360px] items-stretch justify-between gap-2 px-3 sm:h-12 sm:gap-3 sm:px-4 lg:px-6">
    <div class="flex min-w-0 flex-1 items-center gap-1.5 sm:gap-2">
      <button type="button"
              @click="sidebar = !sidebar"
              class="dash-header-toggle"
              aria-label="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <div class="dash-header-rule" aria-hidden="true"></div>
      <div class="min-w-0 flex-1 py-0.5">
        <p class="dash-header-breadcrumb">
          <span class="dash-header-breadcrumb__strong">Antibot</span><span class="dash-header-breadcrumb__sep"> / </span>Dashboard
        </p>
      </div>
      <button type="button" class="dash-header-chip">
        Quick Shortener
      </button>
      <button type="button"
              class="dash-header-toggle dash-header-theme-toggle"
              data-theme-toggle
              aria-label="Toggle light or dark theme"
              title="Theme">
        <svg class="dash-theme-icon dash-theme-icon--to-light h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg class="dash-theme-icon dash-theme-icon--to-dark h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>

    <div class="dash-header-user-rail">
      {% if request.user.is_authenticated %}
        <span class="dash-header-user-name" title="{{ request.user.username }}">{{ request.user.username }}</span>
        <div class="dash-header-user-rule" aria-hidden="true"></div>
      {% endif %}
      <a href="/accounts/logout/" class="dash-header-logout">
        Logout
      </a>
      <a href="/dashboard/profile-settings/" class="dash-header-avatar-link">
        {% if request.user.is_authenticated and request.user.profile.avatar %}
          <img src="{{ request.user.profile.avatar.url }}"
               alt=""
               class="dash-header-avatar-img">
        {% else %}
          <div class="dash-header-avatar-fallback" aria-hidden="true"></div>
        {% endif %}
      </a>
    </div>
  </div>
</header>
