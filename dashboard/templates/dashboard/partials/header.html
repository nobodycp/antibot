<header class="shrink-0 border-b border-zinc-700/80 bg-zinc-800">
  <div class="flex h-12 items-center justify-between gap-3 px-4 sm:h-[3.25rem] sm:px-6">
    <div class="flex min-w-0 flex-1 items-center gap-2 sm:gap-3">
      <button type="button"
              @click="sidebar = !sidebar"
              class="inline-flex shrink-0 items-center justify-center rounded-md border border-zinc-600 bg-zinc-900/40 p-2 text-zinc-200 transition-colors hover:border-zinc-500 hover:bg-zinc-700 focus:outline-none focus:ring-2 focus:ring-green-500/40"
              aria-label="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-semibold leading-tight text-zinc-100">Antibot</p>
        <p class="truncate text-[10px] leading-tight text-zinc-500 sm:text-[11px]">Dashboard</p>
      </div>
      <button type="button"
              class="shrink-0 rounded-md border border-zinc-600/80 bg-zinc-900/30 px-2.5 py-1.5 text-[11px] font-medium text-zinc-400 transition-colors hover:border-zinc-500 hover:bg-zinc-700/60 hover:text-zinc-200">
        Quick Shortener
      </button>
    </div>
    <div class="flex shrink-0 items-center gap-2 sm:gap-3">
      {% if request.user.is_authenticated %}
        <span class="hidden max-w-[7rem] truncate text-xs text-zinc-500 md:inline" title="{{ request.user.username }}">{{ request.user.username }}</span>
      {% endif %}
      <a href="/accounts/logout/"
         class="text-xs font-medium text-zinc-400 transition-colors hover:text-zinc-200 sm:text-[13px]">
        Logout
      </a>
      <a href="/dashboard/profile-settings/"
         class="shrink-0 rounded-full ring-2 ring-transparent transition hover:ring-green-500/60 focus:outline-none focus:ring-green-500/50">
        {% if request.user.is_authenticated and request.user.profile.avatar %}
          <img src="{{ request.user.profile.avatar.url }}"
               alt=""
               class="h-8 w-8 rounded-full border border-zinc-600 object-cover">
        {% else %}
          <div class="h-8 w-8 rounded-full border border-zinc-600 bg-green-600/90" aria-hidden="true"></div>
        {% endif %}
      </a>
    </div>
  </div>
</header>
