<template x-if="sidebar">
  <aside class="flex h-full w-64 shrink-0 flex-col overflow-y-auto border-r border-zinc-700/80 bg-zinc-800 p-3 text-sm">
    <div class="mb-3 border-b border-zinc-700/80 pb-3">
      <p class="text-[10px] font-medium uppercase tracking-wider text-zinc-500">Navigation</p>
      <p class="text-lg font-semibold leading-tight tracking-tight text-zinc-100">Antibot</p>
    </div>
    <nav class="flex flex-col gap-0.5 text-sm">
      <a href="/dashboard/" class="group {% if request.path == '/dashboard/' %}bg-zinc-700/90 font-medium text-green-400 shadow-sm{% else %}text-zinc-300{% endif %} flex items-center gap-2 rounded-md px-3 py-2 transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
        <svg class="h-4 w-4 shrink-0 text-zinc-400 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M13 5v6h6" />
        </svg>
        Dashboard
      </a>

      <a href="#" class="group flex items-center gap-2 rounded-md px-3 py-2 text-sm text-zinc-300 transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
        <svg class="h-4 w-4 shrink-0 text-zinc-400 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 17a4 4 0 100-8 4 4 0 000 8z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1112.21 3H21v9.79z" />
        </svg>
        Statistics
      </a>

      <hr class="my-2 border-t border-zinc-700/80" />

      {% if request.user.is_superuser %}
      <!-- Block Rules -->
      <div x-data="{ open: '{% if '/tracker/blocked-ips/' in request.path or '/tracker/blocked-subnets/' in request.path or '/tracker/blocked-isps/' in request.path or '/tracker/blocked-browsers/' in request.path or '/tracker/blocked-os/' in request.path or '/tracker/allowed-countries/' in request.path or '/tracker/blocked-hostnames/' in request.path or '/tracker/dinger-ip/' in request.path %}true{% else %}false{% endif %}' == 'true' }" class="mt-0.5">
        <button type="button" @click="open = !open" class="group flex w-full items-center justify-between rounded-md px-3 py-2 text-left text-sm font-medium text-zinc-300 transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
          <span class="flex items-center gap-2">
            <svg class="h-4 w-4 shrink-0 text-zinc-400 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m2 0a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            Block Rules
          </span>
          <svg :class="{'rotate-90': open}" class="h-4 w-4 shrink-0 transform text-zinc-500 transition-transform duration-150 group-hover:text-zinc-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-show="open" class="mt-1 flex flex-col space-y-0.5 border-l border-zinc-700/60 pl-2 ml-2">
          <a href="/tracker/blocked-subnets/" class="group {% if request.path == '/tracker/blocked-subnets/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01" />
            </svg>
            Subnet
          </a>

          <a href="/tracker/blocked-ips/" class="group {% if request.path == '/tracker/blocked-ips/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01" />
            </svg>
            IP
          </a>

          <a href="/tracker/blocked-isps/" class="group {% if request.path == '/tracker/blocked-isps/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
            ISP
          </a>

          <a href="/tracker/blocked-browsers/" class="group {% if request.path == '/tracker/blocked-browsers/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            Browser
          </a>

          <a href="/tracker/blocked-os/" class="group {% if request.path == '/tracker/blocked-os/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 21h8M12 17v4m-5-4h10a1 1 0 001-1V5a1 1 0 00-1-1H7a1 1 0 00-1 1v11a1 1 0 001 1z" />
            </svg>
            OS
          </a>

          <a href="/tracker/blocked-hostnames/" class="group {% if request.path == '/tracker/blocked-hostnames/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 7h18M3 12h18M3 17h18" />
            </svg>
            Hostname
          </a>

          <a href="/tracker/allowed-countries/" class="group {% if request.path == '/tracker/allowed-countries/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            Country
          </a>

          <a href="/tracker/dinger-ip/" class="group {% if request.path == '/tracker/dinger-ip/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
            Dingers IP
          </a>
        </div>
      </div>
      {% endif %}

      <!-- Logs -->
      <div x-data="{ open: '{% if '/tracker/allowed-logs/' in request.path or '/tracker/denied-logs/' in request.path or '/tracker/ip-info/' in request.path %}true{% else %}false{% endif %}' == 'true' }">
        <button type="button" @click="open = !open" class="group flex w-full items-center justify-between rounded-md px-3 py-2 text-left text-sm font-medium text-zinc-300 transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
          <span class="flex items-center gap-2">
            <svg class="h-4 w-4 shrink-0 text-zinc-400 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12h18" />
            </svg>
            Logs
          </span>
          <svg :class="{'rotate-90': open}" class="h-4 w-4 shrink-0 transform text-zinc-500 transition-transform duration-150 group-hover:text-zinc-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-show="open" class="mt-1 flex flex-col space-y-0.5 border-l border-zinc-700/60 pl-2 ml-2">
          <a href="/tracker/allowed-logs/" class="group {% if request.path == '/tracker/allowed-logs/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            Allowed
          </a>

          <a href="/tracker/denied-logs/" class="group {% if request.path == '/tracker/denied-logs/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
            Denied
          </a>

          <a href="/tracker/ip-info/" class="group {% if request.path == '/tracker/ip-info/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.866-3.582 7-8 7h16c-4.418 0-8-3.134-8-7z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3a4 4 0 100 8 4 4 0 000-8z" />
            </svg>
            IP Info
          </a>
        </div>
      </div>

      <!-- Tools (superuser only — shared data, same as file upload) -->
      {% if request.user.is_superuser %}
      <div x-data="{ open: '{% if '/tools/upload-files/' in request.path or '/tools/google-safe-check/' in request.path or '/tools/redirect-check/' in request.path %}true{% else %}false{% endif %}' == 'true' }" class="mt-0.5">
        <button type="button" @click="open = !open" class="group flex w-full items-center justify-between rounded-md px-3 py-2 text-left text-sm font-medium text-zinc-300 transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
          <span class="flex items-center gap-2">
            <svg class="h-4 w-4 shrink-0 text-zinc-400 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v16h16V4H4zm4 4h8v8H8V8z" />
            </svg>
            Tools
          </span>
          <svg :class="{'rotate-90': open}" class="h-4 w-4 shrink-0 transform text-zinc-500 transition-transform duration-150 group-hover:text-zinc-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-show="open" class="mt-1 flex flex-col space-y-0.5 border-l border-zinc-700/60 pl-2 ml-2">
          <a href="/tools/upload-files/" class="group {% if request.path == '/tools/upload-files/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Files
          </a>

          <a href="/tools/google-safe-check/" class="group {% if request.path == '/tools/google-safe-check/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m2 0a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            Safe Browser Checker
          </a>

          <a href="/tools/redirect-check/" class="group {% if request.path == '/tools/redirect-check/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            <svg class="h-4 w-4 shrink-0 text-zinc-500 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7-7 7M5 5h14" />
            </svg>
            Redirect Check
          </a>
        </div>
      </div>
      {% endif %}

      <!-- User -->
      <div x-data="{ open: {% if '/dashboard/profile-settings/' in request.path or '/dashboard/telegram-backup-settings/' in request.path or '/dashboard/users/' in request.path %}true{% else %}false{% endif %} }" class="mt-0.5">
        <button type="button" @click="open = !open" class="group flex w-full items-center justify-between rounded-md px-3 py-2 text-left text-sm font-medium text-zinc-300 transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
          <span class="flex items-center gap-2">
            <svg class="h-4 w-4 shrink-0 text-zinc-400 transition-colors group-hover:text-zinc-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A9 9 0 1118.88 17.8M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            User
          </span>

          <svg :class="{'rotate-90': open}" class="h-4 w-4 shrink-0 transform text-zinc-500 transition-transform duration-150 group-hover:text-zinc-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-show="open" class="mt-1 flex flex-col space-y-0.5 border-l border-zinc-700/60 pl-2 ml-2">
          <a href="/dashboard/profile-settings/" class="group {% if request.path == '/dashboard/profile-settings/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            Profile
          </a>

          {% if request.user.is_superuser %}
          <a href="/dashboard/telegram-backup-settings/" class="group {% if request.path == '/dashboard/telegram-backup-settings/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            Backup
          </a>

          <a href="/dashboard/users/" class="group {% if request.path == '/dashboard/users/' %}bg-zinc-700/90 font-medium text-green-400{% else %}text-zinc-400{% endif %} flex items-center gap-2 rounded-md py-1.5 pl-2 pr-2 text-xs transition-colors duration-150 hover:bg-zinc-700/70 hover:text-zinc-100">
            Users
          </a>
          {% endif %}
        </div>
      </div>

    </nav>
  </aside>
</template>
