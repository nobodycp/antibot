<template x-if="sidebar">
  <aside class="dash-app-sidebar dash-sidebar-aside flex h-full w-56 shrink-0 flex-col overflow-x-hidden overflow-y-auto py-3 pl-2 pr-1.5 text-xs sm:w-[15rem] sm:text-sm">
    <div class="dash-sidebar-brand">
      <p class="dash-sidebar-brand__kicker">Navigation</p>
      <p class="dash-sidebar-brand__title">Antibot</p>
    </div>
    <nav
      class="flex flex-1 flex-col gap-0.5 pb-2"
      x-data="{
        openSections: {
          'block-rules': {% if '/tracker/blocked-ips/' in request.path or '/tracker/blocked-subnets/' in request.path or '/tracker/blocked-isps/' in request.path or '/tracker/blocked-browsers/' in request.path or '/tracker/blocked-os/' in request.path or '/tracker/blocked-hostnames/' in request.path or '/tracker/dinger-ip/' in request.path or '/tracker/allowed-countries/' in request.path %}true{% else %}false{% endif %},
          'logs': {% if '/tracker/allowed-logs/' in request.path or '/tracker/denied-logs/' in request.path or '/tracker/ip-info/' in request.path %}true{% else %}false{% endif %},
          'tools': {% if '/tools/upload-files/' in request.path or '/tools/google-safe-check/' in request.path or '/tools/redirect-check/' in request.path or '/tools/rsa-decrypt/' in request.path or '/tools/cloudflare-domains/' in request.path or '/tools/whatsapp-check/' in request.path %}true{% else %}false{% endif %},
          'user': {% if '/dashboard/profile-settings/' in request.path %}true{% else %}false{% endif %},
          'admin': {% if '/dashboard/telegram-backup-settings/' in request.path or '/dashboard/users/' in request.path or '/tools/cloud-sync/' in request.path %}true{% else %}false{% endif %},
        },
        processNestedNav(id) {
          this.$nextTick(() => {
            const el = this.$refs['nested-' + id];
            if (el && window.htmx) htmx.process(el);
          });
        },
        initNav() {
          this.$nextTick(() => {
            if (!window.htmx) return;
            htmx.process(this.$el);
            for (const id of Object.keys(this.openSections)) {
              if (this.openSections[id]) this.processNestedNav(id);
            }
          });
        },
        toggleSection(id) {
          const opening = !this.openSections[id];
          this.openSections[id] = opening;
          if (opening) this.processNestedNav(id);
        },
        navigateToSection(id) {
          for (const key in this.openSections) {
            this.openSections[key] = (key === id);
          }
        },
      }"
      x-init="initNav()"
    >
      <a href="/dashboard/" data-nav-tier="top" hx-get="/dashboard/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" class="group dash-nav-top {% if request.path == '/dashboard/' %}is-active{% endif %}">
        <svg class="dash-nav-ico h-3.5 w-3.5 sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M13 5v6h6" />
        </svg>
        Dashboard
      </a>

      <a href="#" data-nav-tier="top" class="group dash-nav-top dash-nav-top--static">
        <svg class="dash-nav-ico h-3.5 w-3.5 sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 17a4 4 0 100-8 4 4 0 000 8z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1112.21 3H21v9.79z" />
        </svg>
        Statistics
      </a>

      <div class="dash-sidebar-sep" role="separator"></div>

      <!-- Block Rules -->
      <div>
        <button type="button" @click="toggleSection('block-rules')" class="dash-nav-section-btn">
          <span class="flex items-center gap-2">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="nav_block_rules" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Block Rules
          </span>
          <svg :class="{'rotate-90': openSections['block-rules']}" class="dash-nav-chevron h-3.5 w-3.5 transform sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-ref="nested-block-rules" x-show="openSections['block-rules']" x-cloak class="dash-nav-nested space-y-px">
          {% if request.user.is_superuser %}
          <a href="/tracker/blocked-subnets/" data-nav-tier="sub" hx-get="/tracker/blocked-subnets/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/blocked-subnets/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="blocked_subnet" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Subnet
          </a>

          <a href="/tracker/blocked-ips/" data-nav-tier="sub" hx-get="/tracker/blocked-ips/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/blocked-ips/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="blocked_ip" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            IP
          </a>

          <a href="/tracker/blocked-isps/" data-nav-tier="sub" hx-get="/tracker/blocked-isps/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/blocked-isps/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="blocked_isp" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            ISP
          </a>

          <a href="/tracker/blocked-browsers/" data-nav-tier="sub" hx-get="/tracker/blocked-browsers/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/blocked-browsers/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="blocked_browser" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Browser
          </a>

          <a href="/tracker/blocked-os/" data-nav-tier="sub" hx-get="/tracker/blocked-os/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/blocked-os/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="blocked_os" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            OS
          </a>

          <a href="/tracker/blocked-hostnames/" data-nav-tier="sub" hx-get="/tracker/blocked-hostnames/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/blocked-hostnames/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="blocked_hostname" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Hostname
          </a>

          <a href="/tracker/dinger-ip/" data-nav-tier="sub" hx-get="/tracker/dinger-ip/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/dinger-ip/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="dinger_ip" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Dingers IP
          </a>
          {% endif %}

          <a href="/tracker/allowed-countries/" data-nav-tier="sub" hx-get="/tracker/allowed-countries/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('block-rules')" class="group dash-nav-sub {% if request.path == '/tracker/allowed-countries/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="allowed_country" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Allowed Countries
          </a>
        </div>
      </div>

      <!-- Logs -->
      <div>
        <button type="button" @click="toggleSection('logs')" class="dash-nav-section-btn">
          <span class="flex items-center gap-2">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="nav_logs" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Logs
          </span>
          <svg :class="{'rotate-90': openSections['logs']}" class="dash-nav-chevron h-3.5 w-3.5 transform sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-ref="nested-logs" x-show="openSections['logs']" x-cloak class="dash-nav-nested space-y-px">
          <a href="/tracker/allowed-logs/" data-nav-tier="sub" hx-get="/tracker/allowed-logs/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('logs')" class="group dash-nav-sub {% if request.path == '/tracker/allowed-logs/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="log_allowed" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Allowed
          </a>

          <a href="/tracker/denied-logs/" data-nav-tier="sub" hx-get="/tracker/denied-logs/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('logs')" class="group dash-nav-sub {% if request.path == '/tracker/denied-logs/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="log_denied" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Denied
          </a>

          <a href="/tracker/ip-info/" data-nav-tier="sub" hx-get="/tracker/ip-info/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('logs')" class="group dash-nav-sub {% if request.path == '/tracker/ip-info/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="ip_info" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            IP Info
          </a>
        </div>
      </div>

      <!-- Tools: Cloudflare + WhatsApp for all users; RSA decrypt for staff; other tools superuser-only -->
      <div>
        <button type="button" @click="toggleSection('tools')" class="dash-nav-section-btn">
          <span class="flex items-center gap-2">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="nav_tools" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Tools
          </span>
          <svg :class="{'rotate-90': openSections['tools']}" class="dash-nav-chevron h-3.5 w-3.5 transform sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-ref="nested-tools" x-show="openSections['tools']" x-cloak class="dash-nav-nested space-y-px">
          {% include "dashboard/partials/includes/tools_nav_user_tools.html" %}

          {% if request.user.is_superuser %}
          <a href="/tools/upload-files/" data-nav-tier="sub" hx-get="/tools/upload-files/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('tools')" class="group dash-nav-sub {% if request.path == '/tools/upload-files/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="tool_files" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Files
          </a>

          <a href="/tools/google-safe-check/" data-nav-tier="sub" hx-get="/tools/google-safe-check/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('tools')" class="group dash-nav-sub {% if request.path == '/tools/google-safe-check/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="tool_safe" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Safe Browser Checker
          </a>

          <a href="/tools/redirect-check/" data-nav-tier="sub" hx-get="/tools/redirect-check/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('tools')" class="group dash-nav-sub {% if request.path == '/tools/redirect-check/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="tool_redirect" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Redirect Check
          </a>

          {% endif %}

          {% if request.user.is_staff %}
          <a href="/tools/rsa-decrypt/" data-nav-tier="sub" hx-get="/tools/rsa-decrypt/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('tools')" class="group dash-nav-sub {% if request.path == '/tools/rsa-decrypt/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="tool_rsa" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            RSA decrypt
          </a>
          {% endif %}
        </div>
      </div>

      <!-- User -->
      <div>
        <button type="button" @click="toggleSection('user')" class="dash-nav-section-btn">
          <span class="flex items-center gap-2">
            <svg class="dash-nav-ico h-3.5 w-3.5 sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A9 9 0 1118.88 17.8M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            User
          </span>

          <svg :class="{'rotate-90': openSections['user']}" class="dash-nav-chevron h-3.5 w-3.5 transform sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-ref="nested-user" x-show="openSections['user']" x-cloak class="dash-nav-nested space-y-px">
          <a href="/dashboard/profile-settings/" data-nav-tier="sub" hx-get="/dashboard/profile-settings/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('user')" class="group dash-nav-sub {% if request.path == '/dashboard/profile-settings/' %}is-active{% endif %}">
            <svg class="dash-nav-ico h-3.5 w-3.5 sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
            Profile
          </a>
        </div>
      </div>

      {% if request.user.is_superuser %}
      <!-- Admin (last collapsible section) -->
      <div>
        <button type="button" @click="toggleSection('admin')" class="dash-nav-section-btn">
          <span class="flex items-center gap-2">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="nav_admin" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Admin
          </span>
          <svg :class="{'rotate-90': openSections['admin']}" class="dash-nav-chevron h-3.5 w-3.5 transform sm:h-4 sm:w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div x-ref="nested-admin" x-show="openSections['admin']" x-cloak class="dash-nav-nested space-y-px">
          <a href="/dashboard/users/" data-nav-tier="sub" hx-get="/dashboard/users/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('admin')" class="group dash-nav-sub {% if '/dashboard/users/' in request.path %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="users_team" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Users
          </a>

          <a href="/dashboard/telegram-backup-settings/" data-nav-tier="sub" hx-get="/dashboard/telegram-backup-settings/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('admin')" class="group dash-nav-sub {% if request.path == '/dashboard/telegram-backup-settings/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="backup_settings" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Backup
          </a>

          <a href="/tools/cloud-sync/" data-nav-tier="sub" hx-get="/tools/cloud-sync/" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true" @click="navigateToSection('admin')" class="group dash-nav-sub {% if request.path == '/tools/cloud-sync/' %}is-active{% endif %}">
            <span class="dash-nav-ico shrink-0">
              {% include "dashboard/partials/includes/dashboard_icon.html" with icon_key="cloud_sync" icon_size_class="h-3.5 w-3.5 sm:h-4 sm:w-4" %}
            </span>
            Cloudflare Sync
          </a>
        </div>
      </div>
      {% endif %}

    </nav>
  </aside>
</template>
