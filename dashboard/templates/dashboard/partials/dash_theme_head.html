{# Sync theme before paint; exposes window.dashSetTheme / dashToggleTheme #}
<script>
(function () {
  var KEY = 'dash-theme';
  var root = document.documentElement;
  try {
    var stored = localStorage.getItem(KEY);
    if (stored === 'light' || stored === 'dark') {
      root.setAttribute('data-theme', stored);
    } else if (!root.getAttribute('data-theme')) {
      root.setAttribute('data-theme', 'dark');
    }
  } catch (e) {
    if (!root.getAttribute('data-theme')) root.setAttribute('data-theme', 'dark');
  }
  window.dashSetTheme = function (t) {
    if (t !== 'light' && t !== 'dark') return;
    root.setAttribute('data-theme', t);
    try {
      localStorage.setItem(KEY, t);
    } catch (err) {}
  };
  window.dashToggleTheme = function () {
    window.dashSetTheme(root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
  };
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-theme-toggle]').forEach(function (el) {
      el.addEventListener('click', function () {
        window.dashToggleTheme();
      });
    });
  });
})();
</script>
