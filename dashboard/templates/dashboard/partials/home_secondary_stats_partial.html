<div
  hx-get="/dashboard/home/secondary-stats/"
  hx-trigger="every 10s"
  hx-target="this"
  hx-swap="outerHTML"
  class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-3"
>
  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Visitors Today</div>
    <div class="text-sm font-semibold text-white mt-1">{{ visitors_today }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Denied Today</div>
    <div class="text-sm font-semibold text-red-400 mt-1">{{ denied_today }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Unique IPs Today</div>
    <div class="text-sm font-semibold text-white mt-1">{{ unique_ips_today }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Blocked ISPs</div>
    <div class="text-sm font-semibold text-yellow-400 mt-1">{{ total_blocked_isps }}</div>
  </div>

  <div class="overflow-hidden rounded-xl border border-zinc-700/50 bg-zinc-800/60 px-3 py-2 shadow-md shadow-black/10 ring-1 ring-zinc-700/30">
    <div class="text-[10px] text-zinc-500 uppercase tracking-wide">Blocked Subnets</div>
    <div class="text-sm font-semibold text-white mt-1">{{ total_blocked_subnets }}</div>
  </div>
</div>
