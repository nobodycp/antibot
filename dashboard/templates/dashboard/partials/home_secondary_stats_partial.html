<div
  hx-get="/dashboard/home/secondary-stats/"
  hx-trigger="every 10s"
  hx-target="this"
  hx-swap="outerHTML"
  class="grid grid-cols-2 gap-3 sm:grid-cols-3 xl:grid-cols-5"
>
  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Visitors Today</div>
    <div class="ds-stat-tile__value">{{ visitors_today }}</div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Denied Today</div>
    <div class="ds-stat-tile__value"><span class="ds-text-danger">{{ denied_today }}</span></div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Unique IPs Today</div>
    <div class="ds-stat-tile__value">{{ unique_ips_today }}</div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Blocked ISPs</div>
    <div class="ds-stat-tile__value"><span class="ds-text-warning">{{ total_blocked_isps }}</span></div>
  </div>

  <div class="ds-stat-tile">
    <div class="ds-stat-tile__label">Blocked Subnets</div>
    <div class="ds-stat-tile__value">{{ total_blocked_subnets }}</div>
  </div>
</div>
